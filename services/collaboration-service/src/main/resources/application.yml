spring:
  application:
    name: collaboration-service

  datasource:
    url: jdbc:mysql://localhost:3306/freelance_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Flyway Configuration
  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration
    enabled: false
    validate-on-migrate: false
    clean-disabled: false

  # OAuth2 Resource Server Configuration (même Keycloak que backend1 / frontend)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/projetpidev
          jwk-set-uri: http://localhost:8080/realms/projetpidev/protocol/openid-connect/certs

server:
  port: 8083  # Fixed: Was 8083, should be 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
app:
  frontend:
    url: http://localhost:4200
  base:
    url: http://localhost:8083  # Collaboration service port (project service = 8082)

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.freelance: DEBUG
    org.flywaydb: INFO
