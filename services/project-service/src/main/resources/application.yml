spring:
  application:
    name: project-service
  
  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/freelance_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# Server Configuration
server:
  port: 8082  # Different port from user-service (8081)

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    # appname must match gateway lb://project-service

# Application Configuration
app:
  frontend:
    url: http://localhost:4200
  base:
    url: http://localhost:8082
  # Payment service (tokens). Direct URL for server-to-server calls.
  payment-service-url: http://localhost:8095/api/payments
  # Token costs (use 0 to disable)
  tokens-per-project: 5
  tokens-per-proposal: 2

# Ollama (local LLM) - for AI draft-from-text
ollama:
  base-url: http://localhost:11434
  model: qwen2.5:3b
  timeout-seconds: 60

# Logging Configuration
logging:
  level:
    org.hibernate.SQL: DEBUG
    com.freelance: DEBUG
