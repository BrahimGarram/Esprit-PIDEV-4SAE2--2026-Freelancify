spring:
  application:
    name: user-service
  
  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/freelance_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  # Keycloak OAuth2 Resource Server Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak JWT Issuer URI
          # Replace with your Keycloak server URL
          issuer-uri: http://localhost:8080/realms/projetpidev
          # JWT validation settings
          jwk-set-uri: http://localhost:8080/realms/projetpidev/protocol/openid-connect/certs
  
  # Email Configuration (for password reset)
  mail:
    host: smtp.gmail.com
    port: 587
    username: sahem.index@gmail.com
    password: qwfzcavugntkgdev
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Server Configuration
server:
  port: 8081  # Changed to 8081 to avoid conflict with Keycloak (port 8080)

# Keycloak Admin Configuration (for user registration)
keycloak:
  admin:
    url: http://localhost:8080
    username: admin
    password: admin
    realm: projetpidev

# Application Configuration
app:
  frontend:
    url: http://localhost:4200
  mail:
    from: sahem.index@gmail.com
    from-name: Freelancify
  upload:
    dir: uploads
  base:
    url: http://localhost:8081

# Ollama (local LLM) - for AI freelancer suggestions + Freelancify chatbox
ollama:
  base-url: http://localhost:11434
  model: qwen2.5:3b          # used by freelancer suggestion
  chat-model: llama3.2       # used by /api/chat (Freelancify assistant)
  timeout-seconds: 60

# Logging Configuration
logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    com.freelance: DEBUG
