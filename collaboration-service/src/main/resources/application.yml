spring:
  application:
    name: collaboration-service

  datasource:
    url: jdbc:mysql://localhost:3306/freelance_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Flyway Configuration
  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration
    enabled: true

  # OAuth2 Resource Server Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/projetpidev
          jwk-set-uri: http://localhost:9090/realms/projetpidev/protocol/openid-connect/certs

server:
  port: 8082  # Fixed: Was 8083, should be 8082

app:
  frontend:
    url: http://localhost:4200
  base:
    url: http://localhost:8082  # Fixed: Updated to match port

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.freelance: DEBUG
    org.flywaydb: INFO
