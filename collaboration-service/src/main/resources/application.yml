spring:
  application:
    name: collaboration-service

  datasource:
    url: jdbc:mysql://localhost:3306/freelance_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8083

app:
  frontend:
    url: http://localhost:4200
  base:
    url: http://localhost:8083

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.freelance: DEBUG
