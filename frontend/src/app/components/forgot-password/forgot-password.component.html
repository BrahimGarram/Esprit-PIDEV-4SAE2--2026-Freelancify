<div class="forgot-password-page">
  <div class="forgot-password-background">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>
  
  <div class="forgot-password-container">
    <div class="forgot-password-card">
      <div class="forgot-password-header">
        <div class="logo-section">
          <img src="assets/new/logo.png" alt="Freelancify" class="auth-logo" onerror="this.src='assets/logo.png'">
          <h1>Reset Password</h1>
          <p *ngIf="!isSubmitted">Enter your email address and we'll send you a link to reset your password</p>
          <p *ngIf="isSubmitted" class="success-message">
            <i class="fas fa-check-circle"></i> Check your email for password reset instructions
          </p>
        </div>
      </div>
      
      <form *ngIf="!isSubmitted" class="forgot-password-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">
            <i class="fas fa-envelope"></i> Email Address
          </label>
          <input 
            type="email" 
            id="email" 
            [(ngModel)]="email" 
            name="email"
            placeholder="Enter your email address"
            required
            [disabled]="isLoading">
        </div>
        
        <div *ngIf="error" class="error-message">
          <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        
        <button type="submit" class="btn-submit" [disabled]="isLoading">
          <span *ngIf="!isLoading">
            <i class="fas fa-paper-plane"></i> Send Reset Link
          </span>
          <span *ngIf="isLoading">
            <i class="fas fa-spinner fa-spin"></i> Sending...
          </span>
        </button>
      </form>
      
      <div *ngIf="isSubmitted" class="success-actions">
        <button class="btn-back" (click)="backToLogin()">
          <i class="fas fa-arrow-left"></i> Back to Login
        </button>
      </div>
      
      <div class="forgot-password-footer">
        <p>Remember your password? <a routerLink="/login">Sign In</a></p>
      </div>
    </div>
  </div>
</div>
