<div class="reset-password-page">
  <div class="reset-password-background">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>
  
  <div class="reset-password-container">
    <div class="reset-password-card">
      <div class="reset-password-header">
        <div class="logo-section">
          <img src="assets/new/logo.png" alt="Freelancify" class="auth-logo" onerror="this.src='assets/logo.png'">
          <h1 *ngIf="!success">Reset Password</h1>
          <h1 *ngIf="success">Password Reset Successful!</h1>
          <p *ngIf="!success">Enter your new password below</p>
          <p *ngIf="success" class="success-message">
            <i class="fas fa-check-circle"></i> Your password has been reset successfully. Redirecting to login...
          </p>
        </div>
      </div>
      
      <!-- Success Message -->
      <div *ngIf="success" class="success-actions">
        <button class="btn-login" (click)="goToLogin()">
          <i class="fas fa-sign-in-alt"></i> Go to Login
        </button>
      </div>
      
      <!-- Reset Password Form -->
      <form *ngIf="!success" class="reset-password-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="newPassword">
            <i class="fas fa-lock"></i> New Password
          </label>
          <input 
            type="password" 
            id="newPassword" 
            [(ngModel)]="newPassword" 
            name="newPassword"
            placeholder="Enter your new password (min 8 characters)"
            required
            minlength="8"
            [disabled]="isLoading">
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">
            <i class="fas fa-lock"></i> Confirm Password
          </label>
          <input 
            type="password" 
            id="confirmPassword" 
            [(ngModel)]="confirmPassword" 
            name="confirmPassword"
            placeholder="Confirm your new password"
            required
            [disabled]="isLoading">
        </div>
        
        <div *ngIf="error" class="error-message">
          <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        
        <button type="submit" class="btn-submit" [disabled]="isLoading">
          <span *ngIf="!isLoading">
            <i class="fas fa-key"></i> Reset Password
          </span>
          <span *ngIf="isLoading">
            <i class="fas fa-spinner fa-spin"></i> Resetting...
          </span>
        </button>
      </form>
      
      <div class="reset-password-footer" *ngIf="!success">
        <p>Remember your password? <a routerLink="/login">Sign In</a></p>
        <p>Need a new reset link? <a routerLink="/forgot-password">Request Reset</a></p>
      </div>
    </div>
  </div>
</div>
