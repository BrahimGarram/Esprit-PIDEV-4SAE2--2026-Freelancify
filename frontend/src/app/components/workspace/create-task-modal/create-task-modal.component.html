<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" (click)="closeModal()">
  <div class="bg-white rounded-lg shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="flex items-center justify-between p-6 border-b">
      <h2 class="text-2xl font-semibold text-gray-800">Create New Task</h2>
      <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Form -->
    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="p-6 space-y-4">
      <!-- Title -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Title <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          formControlName="title"
          class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          [class.border-red-500]="isFieldInvalid('title')"
          placeholder="Enter task title"
        />
        <p *ngIf="isFieldInvalid('title')" class="text-red-500 text-sm mt-1">
          {{ getFieldError('title') }}
        </p>
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea
          formControlName="description"
          rows="3"
          class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="Enter task description"
        ></textarea>
      </div>

      <!-- Assigned To -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Assign To <span class="text-red-500">*</span>
        </label>
        <select
          formControlName="assignedFreelancerId"
          class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          [class.border-red-500]="isFieldInvalid('assignedFreelancerId')"
        >
          <option value="">Select team member</option>
          <option *ngFor="let member of teamMembers" [value]="member.freelancerId">
            {{ member.freelancerName }} ({{ member.role }})
          </option>
        </select>
        <p *ngIf="isFieldInvalid('assignedFreelancerId')" class="text-red-500 text-sm mt-1">
          {{ getFieldError('assignedFreelancerId') }}
        </p>
      </div>

      <!-- Priority & Status Row -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Priority <span class="text-red-500">*</span>
          </label>
          <select
            formControlName="priority"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          >
            <option *ngFor="let priority of priorities" [value]="priority">
              {{ priority }}
            </option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Status <span class="text-red-500">*</span>
          </label>
          <select
            formControlName="status"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          >
            <option *ngFor="let status of statuses" [value]="status">
              {{ status.replace('_', ' ') }}
            </option>
          </select>
        </div>
      </div>

      <!-- Estimated Hours & Deadline Row -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Estimated Hours</label>
          <input
            type="number"
            formControlName="estimatedHours"
            min="0"
            step="0.5"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="0"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Deadline</label>
          <input
            type="datetime-local"
            formControlName="deadline"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>
      </div>

      <!-- Milestone & Sprint Row -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Milestone</label>
          <select
            formControlName="milestoneId"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          >
            <option value="">None</option>
            <option *ngFor="let milestone of milestones" [value]="milestone.id">
              {{ milestone.title }}
            </option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Sprint</label>
          <select
            formControlName="sprintId"
            class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          >
            <option value="">None</option>
            <option *ngFor="let sprint of sprints" [value]="sprint.id">
              {{ sprint.name }}
            </option>
          </select>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex justify-end space-x-3 pt-4 border-t">
        <button
          type="button"
          (click)="closeModal()"
          class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50"
          [disabled]="loading"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50"
          [disabled]="loading || taskForm.invalid"
        >
          {{ loading ? 'Creating...' : 'Create Task' }}
        </button>
      </div>
    </form>
  </div>
</div>
