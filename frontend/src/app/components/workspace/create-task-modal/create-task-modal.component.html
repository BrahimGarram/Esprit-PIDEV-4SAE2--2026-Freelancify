<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="modal-header">
      <h2 class="modal-title">
        <svg class="title-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
        Create New Task
      </h2>
      <button (click)="closeModal()" class="btn-close">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Form -->
    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
      <div class="modal-body">
        <!-- Title -->
        <div class="form-group">
          <label class="form-label">
            Title <span class="required">*</span>
          </label>
          <input
            type="text"
            formControlName="title"
            class="form-input"
            [class.error]="isFieldInvalid('title')"
            placeholder="Enter a descriptive task title"
          />
          <p *ngIf="isFieldInvalid('title')" class="error-message">
            <svg class="error-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            {{ getFieldError('title') }}
          </p>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea
            formControlName="description"
            class="form-textarea"
            placeholder="Provide detailed information about this task"
          ></textarea>
          <p class="helper-text">
            <svg class="helper-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                    d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Add context, requirements, or acceptance criteria
          </p>
        </div>

        <!-- Assigned To -->
        <div class="form-group">
          <label class="form-label">
            Assign To <span class="required">*</span>
          </label>
          <select
            formControlName="assignedFreelancerId"
            class="form-select"
            [class.error]="isFieldInvalid('assignedFreelancerId')"
          >
            <option value="">Select team member</option>
            <option *ngFor="let member of teamMembers" [value]="member.freelancerId">
              {{ member.freelancerName }} - {{ formatRole(member.role) }}
            </option>
          </select>
          <p *ngIf="isFieldInvalid('assignedFreelancerId')" class="error-message">
            <svg class="error-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            {{ getFieldError('assignedFreelancerId') }}
          </p>
        </div>

        <!-- Priority & Status Row -->
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">
              Priority <span class="required">*</span>
            </label>
            <select formControlName="priority" class="form-select">
              <option *ngFor="let priority of priorities" [value]="priority">
                {{ priority }}
              </option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">
              Status <span class="required">*</span>
            </label>
            <select formControlName="status" class="form-select">
              <option *ngFor="let status of statuses" [value]="status">
                {{ formatStatus(status) }}
              </option>
            </select>
          </div>
        </div>

        <!-- Estimated Hours & Deadline Row -->
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Estimated Hours</label>
            <input
              type="number"
              formControlName="estimatedHours"
              min="0"
              step="0.5"
              class="form-input"
              placeholder="0"
            />
          </div>

          <div class="form-group">
            <label class="form-label">Deadline</label>
            <input
              type="datetime-local"
              formControlName="deadline"
              class="form-input"
            />
          </div>
        </div>

        <!-- Milestone & Sprint Row -->
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Milestone</label>
            <select formControlName="milestoneId" class="form-select">
              <option value="">None</option>
              <option *ngFor="let milestone of milestones" [value]="milestone.id">
                {{ milestone.title }}
              </option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Sprint</label>
            <select formControlName="sprintId" class="form-select">
              <option value="">None</option>
              <option *ngFor="let sprint of sprints" [value]="sprint.id">
                {{ sprint.name }}
              </option>
            </select>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="modal-footer">
        <button
          type="button"
          (click)="closeModal()"
          class="btn btn-secondary"
          [disabled]="loading"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="loading || taskForm.invalid"
        >
          <span *ngIf="loading" class="spinner"></span>
          <svg *ngIf="!loading" class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          {{ loading ? 'Creating...' : 'Create Task' }}
        </button>
      </div>
    </form>
  </div>
</div>
