spring:
  application:
    name: subscription-service

  datasource:
    url: jdbc:mysql://localhost:3306/freelancify-subscriptions?createDatabaseIfNotExist=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Enable scheduling for subscription renewal and expiration checks
  task:
    scheduling:
      enabled: true

  web:
    cors:
      allowed-origins:
        - "http://localhost:4200"
        - "http://localhost:8080"
      allowed-methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "OPTIONS"
      allowed-headers: "*"
      allow-credentials: true

server:
  port: 8091
  servlet:
    context-path: /api/subscriptions

app:
  payment:
    webhook-secret: your-webhook-secret-here
  frontend:
    url: http://localhost:4200

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.example.subscriptionservice: DEBUG
